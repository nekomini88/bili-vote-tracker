<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bili Vote Tracker</title>
<style>
:root{color-scheme:light;--bg:#f7f8fa;--card:#fff;--line:#e5e7eb;--ink:#303133;--muted:#606266;--accent:#409eff;--ok:#67c23a;--warn:#e6a23c;--danger:#f56c6c;--shadow:0 2px 12px rgba(0,0,0,.06);--r:10px;--theme-name:emerald;--banner-from:#f3fbf6;--banner-to:#eef7f1;--banner-line:#cde6d0}
[data-theme="midnight"]{--bg:#f4f6f9;--card:#ffffff;--line:#e5e7eb;--ink:#0f172a;--muted:#475569;--accent:#3b82f6;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444;--banner-from:#eef2ff;--banner-to:#e0e7ff;--banner-line:#c7d2fe}
[data-theme="ruby"]{--bg:#fff5f6;--card:#ffffff;--line:#fbd0d6;--ink:#2b1018;--muted:#6f3a4a;--accent:#e11d48;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;--banner-from:#fff1f4;--banner-to:#ffe4e6;--banner-line:#fecdd3}
[data-theme="gold"]{--bg:#fffbf5;--card:#ffffff;--line:#f0d898;--ink:#3b2a10;--muted:#7c5a20;--accent:#d97706;--ok:#15803d;--warn:#b45309;--danger:#b91c1c;--banner-from:#fffbeb;--banner-to:#fef3c7;--banner-line:#fde68a}
[data-theme="ocean"]{--bg:#f0f9ff;--card:#ffffff;--line:#cfe5f7;--ink:#052038;--muted:#3b6d88;--accent:#0284c7;--ok:#059669;--warn:#d97706;--danger:#dc2626;--banner-from:#e0f2fe;--banner-to:#cffafe;--banner-line:#a5f3fc}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);min-height:100vh}
.glass-orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.glass-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45;animation:orb-float 18s ease-in-out infinite alternate}
.glass-orb-1{width:50vw;height:50vh;top:-10%;left:-5%;background:#0089c966}
.glass-orb-2{width:40vw;height:45vh;bottom:-5%;right:-5%;background:#00a88359}
.glass-orb-3{width:35vw;height:35vh;top:30%;left:40%;background:#b37ed84d}
.dark .glass-orb-1{background:#003f60}
.dark .glass-orb-2{background:#00363a}
.dark .glass-orb-3{background:#13284b}
.dark{color-scheme:dark}
.dark .app{background:rgba(15,23,42,.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.dark header h1{color:#e2e8f0}
.dark .toolbar .btn{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark select{background:#1e293b!important;border-color:#334155!important;color:#e2e8f0!important}
.dark .chart{background:rgba(30,41,59,.6);border-color:#334155;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.dark .tabs .tab{background:#1e293b;border-color:#334155;color:#94a3b8}
.dark .tabs .tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.dark table{color:#e2e8f0}
.dark thead{background:rgba(30,41,59,.8);color:#94a3b8}
.dark tbody tr:nth-child(even){background:rgba(255,255,255,.04)}
.dark tbody tr:hover{background:rgba(59,130,246,.15)}
.dark td{border-color:#1e293b}
.dark footer{color:#94a3b8}
.dark #geoLines span{color:#cbd5e1!important}
.dark .empty{color:#64748b}
.dark .modal-backdrop{background:rgba(0,0,0,.6)}
.dark .modal{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark input[type=password],.dark input[type=text]{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark input[type=checkbox]{accent-color:#3b82f6}
@keyframes orb-float{0%{transform:translate(0) scale(1)}50%{transform:translate(8%,12%) scale(1.1)}to{transform:translate(-5%,8%) scale(.95)}}
.app{max-width:1280px;margin:0 auto;padding:24px 14px 64px}
header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 18px;flex-wrap:wrap;gap:10px}
header h1{font-size:22px;font-weight:700;margin:0;letter-spacing:.2px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{padding:9px 14px;border:none;border-radius:8px;color:#fff;background:var(--accent);cursor:pointer;font-size:14px;transition:filter .2s,transform .05s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.stat .label{font-size:12px;color:var(--muted)}
.stat .value{font-size:22px;font-weight:700;margin-top:6px}
.kpi-green{color:var(--ok)}.kpi-blue{color:var(--accent)}.kpi-orange{color:var(--warn)}.kpi-red{color:var(--danger)}
.table-wrap{overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:18px}
table{width:100%;border-collapse:collapse;min-width:1100px}
th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);color:var(--muted);font-size:14px;vertical-align:top;white-space:nowrap}
th{color:var(--ink);font-weight:600;background:#fafafa;position:sticky;top:0}
tbody tr:hover{background:#f5f7fa}
.chart{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:18px}
.chart-header{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.empty{text-align:center;padding:24px;color:var(--muted)}
.muted{color:var(--muted)}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-desc{font-size:11px;opacity:.85}
footer{text-align:center;color:var(--muted);font-size:12px;padding:16px 0 8px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:18px;width:min(420px,92vw);box-shadow:0 10px 30px rgba(0,0,0,.15)}
.modal h3{margin:0 0 12px}
.modal .field{margin-bottom:10px}
.delta-up{color:var(--danger)}.delta-down{color:var(--ok)}.delta-flat{color:var(--muted)}
.hidden{display:none !important}

.candidate-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.candidate-wrap label{font-size:13px;color:var(--muted)}
.candidate-wrap select{padding:8px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--ink);font-size:14px;min-width:180px;cursor:pointer}
.chart-hint{font-size:12px;color:var(--muted)}

.btn-bubble{position:relative;overflow:visible;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.btn-bubble::after{content:"";position:absolute;top:-5px;right:-5px;width:12px;height:12px;background:#ef4444;border-radius:50%;opacity:0;transform:scale(0);transition:opacity .18s ease,transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 8px rgba(239,68,68,.35);pointer-events:none}
.btn-bubble:hover::after{opacity:1;transform:scale(1)}
.btn-bubble:active{transform:scale(0.9)}

.bubble-toast{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,.18);z-index:9999;display:flex;gap:10px;align-items:flex-start;max-width:min(380px,92vw);animation:bubble-in .35s cubic-bezier(.34,1.56,.64,1) forwards, bubble-out .3s ease-in 3.2s forwards;color:var(--ink);font-size:14px}
@keyframes bubble-in{0%{opacity:0;transform:translateY(-20px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bubble-out{to{opacity:0;transform:translateY(-10px) scale(.96)}}
.bubble-toast::before{content:"";position:absolute;top:-6px;right:14px;width:10px;height:10px;background:var(--card);border-left:1px solid var(--line);border-top:1px solid var(--line);transform:rotate(45deg);border-radius:2px}
.dark .bubble-toast{background:#0f172a;border-color:#334155;box-shadow:0 12px 40px rgba(0,0,0,.55)}
.dark .bubble-toast::before{background:#0f172a;border-color:#334155}
</style>
</head>
<body>
<div class="glass-orbs" aria-hidden="true">
  <div class="glass-orb glass-orb-1"></div>
  <div class="glass-orb glass-orb-2"></div>
  <div class="glass-orb glass-orb-3"></div>
</div>
<div class="app">
  <header>
    <h1>📊 Bili Vote Tracker</h1>
    <div class="toolbar">
      <select id="themeSelect" onchange="setTheme(this.value)" style="padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--ink);font-size:14px;cursor:pointer">
        <option value="emerald">Emerald</option>
        <option value="midnight">Midnight</option>
        <option value="ruby">Ruby</option>
        <option value="gold">Gold</option>
        <option value="ocean">Ocean</option>
        <option value="sunrise">Sunrise</option>
        <option value="green-mountain">Green Mountain</option>
        <option value="blue-water">Blue Water</option>
        <option value="night">Night</option>
        <option value="material-indigo">Indigo</option>
        <option value="material-pink">Pink</option>
        <option value="material-teal">Teal</option>
      </select>
      <button class="btn" onclick="toggleDayNight()" id="dnBtn" title="切换白天/夜晚">🌓</button>
      <button class="btn btn-bubble" id="bellBtn" onclick="showBubbleToast()" title="通知">
        🔔
      </button>
      <button class="btn" id="btnTrigger" onclick="openAdmin()">管理后台</button>
    </div>
  </header>

  <div class="stats">
    <div class="card stat"><div class="label">候选人</div><div class="value" id="s_candidates">0</div></div>
    <div class="card stat"><div class="label">总采集数</div><div class="value kpi-blue" id="s_count">0</div></div>
    <div class="card stat"><div class="label">最高票数</div><div class="value kpi-orange" id="s_max">0</div></div>
    <div class="card stat"><div class="label">最近采集</div><div class="value kpi-green" id="s_latest">-</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>候选人</th>
          <th>当前票数</th>
          <th title="与1分钟前相比">1分钟差</th>
          <th title="与5分钟前相比">5分钟差</th>
          <th title="与30分钟前相比">30分钟差</th>
          <th title="与6小时前相比">6小时差</th>
          <th title="与24小时前相比">24小时差</th>
          <th>最近采集时间 (UTC+8)</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <div id="chartArea">
    <div class="chart">
    <div class="chart-header">
      <h3 style="margin:0">📈 统计图表</h3>
      <div class="candidate-wrap">
        <label for="chartCandidate">候选人：</label>
        <select id="chartCandidate" onchange="onCandChange()">
          <option value="">- 加载中 -</option>
        </select>
      </div>
      <span class="muted chart-hint" id="chartHint">请选择候选人</span>
      <label style="font-size:13px;color:var(--muted);margin-left:8px;display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="rangeMode" onchange="drawChart()"> 按时间段查询
      </label>
      <input type="datetime-local" id="rangeStart" onchange="onRangeChange()">
      <input type="datetime-local" id="rangeEnd" onchange="onRangeChange()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setChartMode('trend', this)">📈 趋势线<span class="tab-desc">随时间的票数走势</span></button>
      <button class="tab" onclick="setChartMode('bar', this)">📊 票数对比<span class="tab-desc">当前各候选人票数对比</span></button>
      <button class="tab" onclick="setChartMode('delta', this)">📉 增量柱状<span class="tab-desc">每轮采集的票数增量</span></button>
    </div>
    <canvas id="chartCanvas" height="260" style="width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;display:none"></canvas>
    <div style="margin-top:8px;display:none" id="chartTableWrap">
      <table>
        <thead>
          <tr><th>#</th><th>采集时间</th><th>票数</th><th>环比增量</th></tr>
        </thead>
        <tbody id="chartRows"></tbody>
      </table>
    </div>
  </div>
</div>

  <div style="max-width:1280px;margin:0 auto;padding:0 14px">
  <footer id="geoFooter" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px 0 10px;flex-wrap:wrap;gap:10px">
  <div style="font:400 12px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#6e6e73">
    <span style="color:#8e8e93">Powered by</span> <span style="font-weight:600;color:#2b2b2b">NekoMini</span>
  </div>
  <div id="geoLines" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,#f7f7f8,#eaeaec);border:1px solid #d6d6da;border-radius:999px;padding:7px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.6);color:#2b2b2b;font:500 13px/1.2 system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
    <span id="geoLoading" style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:#e8364f;display:inline-block"></span><span style="color:#6e6e73">loading...</span></span>
  </div>
  <div style="font:400 12px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#6e6e73;text-align:right">
    <span style="color:#8e8e93">Theme by</span> <span style="font-weight:600;color:#2b2b2b">NekoMini</span>
  </div>
</footer>
</div>
<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <h3>🔐 管理员后台</h3>
    <div class="field">
      <label>账号</label>
      <input id="adUser" type="text" />
    </div>
    <div class="field">
      <label>密码</label>
      <input id="adPass" type="password" />
    </div>
    <div class="field" style="display:flex;gap:8px;align-items:center">
      <button class="btn" id="adSave" onclick="adminSave()">登录并加载配置</button>
      <button class="btn btn-ghost" onclick="closeAdmin()">关闭</button>
      <span class="muted" id="adStatus" style="margin-left:6px"></span>
    </div>
    <div id="adSettings" class="hidden" style="margin-top:10px">
      <div class="field">
        <label>目标页面</label>
        <input id="cfgUrl" placeholder="https://b23.tv/..." />
      </div>
      <div class="field">
        <label>采集间隔</label>
        <select id="cfgPreset" onchange="onPreset()">
          <option value="1">每 1 分钟</option>
          <option value="5">每 5 分钟</option>
          <option value="10">每 10 分钟</option>
          <option value="30">每 30 分钟</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="field">
        <label>自定义间隔（分钟）</label>
        <input id="cfgCustom" type="number" min="1" max="1440" value="1" />
      </div>
      <div class="field" style="display:flex;gap:8px;align-items:center">
        <button class="btn" onclick="adminSaveConfig()">应用配置</button>
        <span class="muted" id="cfgStatus" style="margin-left:6px"></span>
      </div>
      <div class="muted" style="margin-top:6px;font-size:12px">保存后将立即生效。</div>
    </div>
  </div>
</div>

<script>
const fmt = n => Number(n||0).toLocaleString();
const dateFmt = s => s ? new Date(s).toLocaleString() : '-';
let chartMode = 'trend';
let latestCache = [];
let statsCache = {};
const CANDIDATE_ORDER = [
  "迪迦奥特曼","梦比优斯奥特曼","雷欧奥特曼","捷德奥特曼","布莱泽奥特曼",
  "戴拿奥特曼","奈克赛斯奥特曼","盖亚奥特曼","银河奥特曼","欧布奥特曼",
  "赛罗奥特曼","泽塔奥特曼","艾克斯奥特曼","泰迦奥特曼","希卡利奥特曼",
  "提欧奥特曼","高斯奥特曼","特利迦奥特曼","阿古茹奥特曼","麦克斯奥特曼"
];
const rankIndex = (title) => {
  const i = CANDIDATE_ORDER.indexOf(title);
  return i >= 0 ? i : CANDIDATE_ORDER.length;
};
const rankSort = (a,b) => rankIndex(a.title||'') - rankIndex(b.title||'');
const heroImg = (title, votes)=>{
  const i = CANDIDATE_ORDER.indexOf(title||'');
  if(i < 0) return `<span style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px;background:linear-gradient(135deg,#409eff,#0D8ABC);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px">${title?title[0]:''}</span>`;
  const n = String(i+1).padStart(2,'0');
  const src = `assets/heroes/ultraman_${n}.png`;
  return `<img src="${src}" alt="" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px;object-fit:cover;background:#f3f4f6" onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect width=%2240%22 height=%2240%22 fill=%22%23e0f2fe%22/><text x=%2250%25%22 y=%2254%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%230284c7%22 font-size=%2218%22>${encodeURIComponent(title?title[0]:'')}</text></svg>'">`;
};

function api(path, opts={}) {
  return fetch(path, opts).then(r => r.json()).catch(e => ({error: e.message}));
}

async function renderGeoFooter(){
  const wrap = document.getElementById('geoLines');
  if(!wrap) return;
  let j = {};
  let src = '';
  try{
    const r = await fetch('https://ipapi.co/json/', {signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined});
    if(r.ok){ j = await r.json(); src = 'ipapi'; }
  }catch(e){}
  const render = () => {
    const countryCode = j.country_code || '';
    const countryName = j.country_name || '';
    const city = j.city || '';
    const ip = j.ip || '';
    const browser = detectBrowser();
    const flag = countryCode ? countryCodeToFlag(countryCode) : '<span style="width:8px;height:8px;border-radius:50%;background:#e8364f;display:inline-block"></span>';
    const parts = [flag];
    if(countryName) parts.push(`<span style="font-weight:600;color:var(--ink)">${countryName}</span>`);
    if(city) parts.push(`<span style="color:var(--muted)">${city}</span>`);
    if(ip) parts.push(`<span style="color:var(--muted)">${ip}</span>`);
    if(browser) parts.push(`<span style="color:var(--muted)">${browser}</span>`);
    wrap.innerHTML = parts.join('<span style="color:var(--line);margin:0 2px">·</span>') + '<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#34c759;overflow:hidden;margin-left:6px"><span style="color:#fff;font-size:10px;line-height:1;font-weight:700">⚡</span></span>';
  };
  render();
  if(!src){
    try{
      const r2 = await fetch('https://ipapi.co/json/', {signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined});
      if(r2.ok){ j = await r2.json(); render(); }
    }catch(e){}
  }
}
function countryCodeToFlag(code){
  const c = String(code || '').trim().toUpperCase();
  if(!/^[A-Z]{2}$/.test(c)) return '<span style="width:8px;height:8px;border-radius:50%;background:#e8364f;display:inline-block"></span>';
  return c.replace(/./g, ch => String.fromCodePoint((ch.charCodeAt(0) - 65) + 0x1F1E6));
}
function detectBrowser(){
  const ua = navigator.userAgent || '';
  const data = navigator.userAgentData?.brands || [];
  const chrome = data.find(b => /Chrome|Chromium|Edge|Opera/.test(b.brand));
  if(chrome && /Edg/.test(ua)) return 'Edge';
  if(chrome && /OPR|Opera/.test(ua)) return 'Opera';
  if(chrome && /Chrome|Chromium/.test(ua)) return 'Chrome';
  if(/Firefox/.test(ua)) return 'Firefox';
  if(/Safari/.test(ua) && !/Chrome/.test(ua)) return 'Safari';
  if(/MSIE|Trident/.test(ua)) return 'IE';
  return '';
}
async function load() {
  try {
    const [latest, stats] = await Promise.all([
      api('/api/latest'),
      api('/api/stats')
    ]).catch(e => ({latest: [], stats: {}}));

    latestCache = Array.isArray(latest) ? latest : [];

    const tb = document.getElementById('rows');
    if(!latestCache.length){
      tb.innerHTML = '<tr><td colspan="9" class="empty">暂无数据</td></tr>';
    } else {
      tb.innerHTML = latestCache.slice().sort(rankSort).map((x,idx)=> `<tr>
        <td>${idx+1}</td>
        <td>${heroImg(x.title)}<b>${x.title||''}</b></td>
        <td><b class="kpi-blue">${fmt(x.votes)}</b></td>
        <td class="muted" id="d1m_${idx}">-</td>
        <td class="muted" id="d5m_${idx}">-</td>
        <td class="muted" id="d30m_${idx}">-</td>
        <td class="muted" id="d6h_${idx}">-</td>
        <td class="muted" id="d24h_${idx}">-</td>
        <td>${dateFmt(x.captured_at)}</td>
      </tr>`).join('');
      for(let i=0;i<latestCache.length;i++){
        try{
          const x = latestCache.slice().sort(rankSort)[i];
          const j = await api(`/api/diff?title=${encodeURIComponent(x.title)}`);
          const update = (id, v) => { const el = document.getElementById(id); if(el) el.innerHTML = v; };
          update(`d1m_${i}`, fmtDelta((j && j.intervals && j.intervals['1m'] ? j.intervals['1m'].delta : null)));
          update(`d5m_${i}`, fmtDelta((j && j.intervals && j.intervals['5m'] ? j.intervals['5m'].delta : null)));
          update(`d30m_${i}`, fmtDelta((j && j.intervals && j.intervals['30m'] ? j.intervals['30m'].delta : null)));
          update(`d6h_${i}`, fmtDelta((j && j.intervals && j.intervals['6h'] ? j.intervals['6h'].delta : null)));
          update(`d24h_${i}`, fmtDelta((j && j.intervals && j.intervals['24h'] ? j.intervals['24h'].delta : null)));
        }catch(e){}
      }
    }
    statsCache = stats || {};
    document.getElementById('s_count').textContent = fmt(statsCache.count);
    document.getElementById('s_max').textContent = fmt(statsCache.max_votes);
    document.getElementById('s_candidates').textContent = fmt(statsCache.candidates);
    document.getElementById('s_latest').textContent = statsCache.latest_capture ? dateFmt(statsCache.latest_capture) : '-';

    const candSelect = document.getElementById('chartCandidate');
    if(candSelect){
      candSelect.innerHTML = '';
      if(latestCache.length){
        candSelect.appendChild(new Option('-- 请选择 --', ''));
        latestCache.slice().sort(rankSort).forEach(x => {
          const opt = document.createElement('option');
          opt.value = (x.title||'').replace(/"/g,'&quot;');
          opt.textContent = x.title || '匿名';
          candSelect.appendChild(opt);
        });
      } else {
        candSelect.appendChild(new Option('未采集到数据', ''));
      }
    }
    if(document.getElementById('chartCandidate').value){
      await drawChart();
    }
    renderGeoFooter();
  } catch(e) {
    console.error('load failed', e);
  }
}

function fmtDelta(v){
  if(v === null || v === undefined) return '-';
  const n = Number(v);
  if(!Number.isFinite(n)) return '-';
  if(n === 0 || Object.is(n, -0)) return '<span class="delta-flat">0</span>';
  const sign = n > 0 ? '+' : '';
  const cls = n > 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls}">${sign}${fmt(n)}</span>`;
}

async function drawChart(){
  try{
    const candSelect = document.getElementById('chartCandidate');
    const title = candSelect ? candSelect.value : '';
    const tbody = document.getElementById('chartRows');
    const canvas = document.getElementById('chartCanvas');
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    document.getElementById('chartHint').textContent = title ? `候选人：${title}` : '请选择候选人';
    if(!title){
      if(tbody) tbody.innerHTML='';
      const w = canvas.clientWidth || 900; const h = canvas.clientHeight || 260;
      canvas.width = w; canvas.height = h;
      canvas.style.display = 'block';
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = '#909399'; ctx.font = '14px sans-serif';
      ctx.fillText('请在顶部下拉框选择候选人', 60, h/2);
      if(tbody) document.getElementById('chartTableWrap').style.display='none';
      return;
    }
    const useRange = document.getElementById('rangeMode') && document.getElementById('rangeMode').checked;
    let q;
    if(useRange){
      let rs = document.getElementById('rangeStart').value;
      let re = document.getElementById('rangeEnd').value;
      if(!rs || !re){
        const meta = statsCache || {};
        if(!rs && meta.first_capture) rs = meta.first_capture.slice(0,16);
        if(!re && meta.latest_capture) re = meta.latest_capture.slice(0,16);
        if(rs) document.getElementById('rangeStart').value = rs;
        if(re) document.getElementById('rangeEnd').value = re;
      }
      q = `/api/range?title=${encodeURIComponent(title)}`;
      if(rs) q += `&start=${encodeURIComponent(new Date(rs).toISOString())}`;
      if(re) q += `&end=${encodeURIComponent(new Date(re).toISOString())}`;
    } else {
      q = `/api/history?title=${encodeURIComponent(title)}&limit=300`;
    }
    const hist = await api(q).catch(()=> ({}));
    const points = Array.isArray(hist) ? hist : [];
    const canvasPoints = points.length > 200 ? points.filter((_,i)=> i % Math.ceil(points.length/200) === 0 || i === points.length-1) : points.slice();
    const w = canvas.clientWidth || 900; const h = canvas.clientHeight || 260;
    canvas.width = w; canvas.height = h;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
    for(let i=0;i<=5;i++){ const y=Math.round(i*(h-40)/5)+20; ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(w-10,y);ctx.stroke(); }
    if(chartMode === 'bar' && canvasPoints.length){
      const votes = canvasPoints.map(p=>p.votes);
      const max = Math.max(...votes); const min = Math.min(...votes);
      const pad=60; const plotW=w-90; const plotH=h-70;
      const bw = Math.max(6, plotW / canvasPoints.length - 2);
      canvasPoints.forEach((p,i)=>{
        const x = pad + (i/(canvasPoints.length||1))*plotW;
        const bh = ((p.votes-min)/(max-min||1))*plotH;
        const y = 20+plotH-bh;
        ctx.fillStyle = 'rgba(64,158,255,0.85)';
        ctx.fillRect(x,y,bw,bh);
        if(canvasPoints.length < 20 || i % Math.ceil(canvasPoints.length/20) === 0){
          ctx.fillStyle='#606266'; ctx.font='10px sans-serif';
          ctx.fillText(new Date(p.captured_at).toLocaleTimeString(), x, 20+plotH+14);
        }
      });
      ctx.fillStyle='#303133'; ctx.font='12px sans-serif';
      ctx.fillText(max.toLocaleString(), 6, 30);
      ctx.fillText(min.toLocaleString(), 6, h-20);
    } else if(chartMode === 'delta' && canvasPoints.length >= 2){
      const deltas = canvasPoints.slice(1).map((p,i)=> p.votes - canvasPoints[i].votes);
      const max = Math.max(...deltas,0); const min = Math.min(...deltas,0);
      const pad=60; const plotW=w-90; const plotH=h-70;
      const bw = Math.max(6, plotW / deltas.length - 2);
      deltas.forEach((d,i)=>{
        const x = pad + (i/(deltas.length||1))*plotW;
        const bh = (Math.abs(d)/(Math.max(max,Math.abs(min))||1))*plotH;
        const y = d>=0 ? 20+plotH/2-bh : 20+plotH/2;
        ctx.fillStyle = d>=0 ? 'rgba(245,108,108,0.85)' : 'rgba(103,194,58,0.85)';
        ctx.fillRect(x,y,bw,bh);
      });
      ctx.fillStyle='#303133'; ctx.font='12px sans-serif';
      ctx.fillText(`+${fmt(max)}`, 6, 30);
      ctx.fillText(`${fmt(min)}`, 6, h-20);
      ctx.fillText('0', 20, 20+plotH/2+6);
    } else if(canvasPoints.length >= 2){
      const votes = canvasPoints.map(p=>p.votes);
      const mn = Math.min(...votes); const mx = Math.max(...votes);
      const pad = 20; const plotW = w-60; const plotH = h-70;
      const xFor = i => 50 + (i/(canvasPoints.length-1))*plotW;
      const yFor = v => 20 + plotH - ((v-mn)/(mx-mn||1))*plotH;
      ctx.beginPath(); ctx.strokeStyle = '#409eff'; ctx.lineWidth = 2;
      canvasPoints.forEach((p,i)=>{ const x=xFor(i), y=yFor(p.votes); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      ctx.stroke();
      ctx.beginPath(); ctx.fillStyle = 'rgba(64,158,255,0.15)';
      canvasPoints.forEach((p,i)=>{ const x=xFor(i), y=yFor(p.votes); ctx.lineTo(x,y); ctx.lineTo(x,20+plotH); });
      ctx.closePath(); ctx.fill();
      canvasPoints.forEach((p,i)=>{ const x=xFor(i), y=yFor(p.votes); ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle='#409eff'; ctx.fill(); });
      ctx.fillStyle='#303133'; ctx.font='12px sans-serif';
      ctx.fillText(mx.toLocaleString(), 6, yFor(mx)+4);
      ctx.fillText(mn.toLocaleString(), 6, yFor(mn)+4);
    } else if(points.length === 0){
      const y = 20 + (h-70)/2;
      ctx.fillStyle = '#909399'; ctx.font = '14px sans-serif';
      ctx.fillText('暂无该候选人历史数据', 60, y);
    } else {
      ctx.fillStyle = '#909399'; ctx.font = '14px sans-serif';
      ctx.fillText('数据点不足（至少2条），继续采集后即可生成趋势', 60, h/2);
    }
    if(points.length){
      document.getElementById('chartTableWrap').style.display='block';
      tbody.innerHTML = points.slice().reverse().map((p,i)=>{
      const prev = i < points.length - 1 ? points[points.length - 2 - i].votes : null;
      const delta = prev !== null ? p.votes - prev : null;
      const deltaStr = delta !== null ? ((delta>=0?'+':'')+fmt(delta)) : '-';
      const deltaClass = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-flat';
      return `<tr><td>${i+1}</td><td>${dateFmt(p.captured_at)}</td><td><b>${fmt(p.votes)}</b></td><td class="${deltaClass}">${deltaStr}</td></tr>`;
    }).join('');
  }catch(e){
    console.error('drawChart failed', e);
  }
}

    };

function toggleDayNight(){
  const root = document.documentElement;
  const isDark = root.classList.contains('dark');
  if(isDark){
    root.classList.remove('dark');
    try{ localStorage.setItem('daynight','light'); }catch(e){}
    const btn = document.getElementById('dnBtn');
    if(btn) btn.textContent = '🌙';
  }else{
    root.classList.add('dark');
    try{ localStorage.setItem('daynight','dark'); }catch(e){}
    const btn = document.getElementById('dnBtn');
    if(btn) btn.textContent = '☀️';
  }
}
